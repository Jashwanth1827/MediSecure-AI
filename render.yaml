services:
  - type: web
    name: medisecure-ai
    env: docker
    repo: https://github.com/Jashwanth1827/MediSecure-AI.git
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /
